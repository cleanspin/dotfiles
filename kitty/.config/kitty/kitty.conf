window_padding_width 10 25 10 25
background_opacity 0.85

# Disable close confirmation when processes are running
confirm_os_window_close 0

# Include colors (managed by flavours)
include ./colors.conf
font_family Google Sans Code
bold_font Google Sans Code Bold
italic_font Google Sans Code Italic
bold_italic_font Google Sans Code Bold Italic
font_size 15
cursor_shape underline
cursor_underline_thickness 3.0
cursor_trail 1
scrollback_lines 4000
mouse_hide_wait 12.0

# Remote control and single instance for tab management
allow_remote_control yes
listen_on unix:/tmp/kitty
shell_integration enabled

# Move tab to another OS window (interactive)
map ctrl+shift+d detach_tab ask

# Broadcast kitten configuration
# Launch broadcast kitten to select windows to broadcast to
map ctrl+shift+b launch --allow-remote-control kitty +kitten broadcast

# Create a new window in a new tab for broadcast group
map ctrl+shift+alt+b launch --type=tab --allow-remote-control

# Kitty scrollback with nvim (vim navigation over terminal output)
action_alias kitty_scrollback_nvim kitten /home/cocaine/.local/share/nvim/plugged/kitty-scrollback.nvim/python/kitty_scrollback_nvim.py
map kitty_mod+h kitty_scrollback_nvim

# Disable command finish notifications
notify_on_cmd_finish never
