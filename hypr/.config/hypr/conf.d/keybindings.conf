# Keybindings

$mainMod = SUPER

# Core
bind = $mainMod, Return, exec, kitty --single-instance -o new_os_window=yes
bind = $mainMod, Q, killactive
bind = $mainMod, M, exit
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, V, layoutmsg, togglesplit
bind = $mainMod, Space, exec, ~/.config/rofi/scripts/rofi-toggle.sh -show drun
bind = $mainMod, P, exec, ~/.config/hypr/scripts/float-center.sh

# Clipboard history
bind = $mainMod SHIFT, P, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy
bind = $mainMod SHIFT, V, togglefloating
bind = $mainMod, F, fullscreen

# Lock screen
bind = $mainMod SHIFT, L, exec, hyprlock

# Power menu
bind = $mainMod, X, exec, ~/.config/rofi/scripts/powermenu.sh

# File browser
bind = $mainMod, O, exec, ~/.config/rofi/scripts/rofi-toggle.sh -modi "Curated:~/.config/rofi/scripts/file-browser.sh --curated,Home:~/.config/rofi/scripts/file-browser.sh --home,Global:~/.config/rofi/scripts/file-browser.sh --global" -show Curated -theme ~/.config/rofi/file-browser.rasi

# Workspace cycling (alt-tab style)
bind = ALT, Tab, workspace, e+1
bind = ALT SHIFT, Tab, workspace, e-1

# Screenshots
bind = , Print, exec, grim -g "$(slurp)" - | wl-copy
bind = SHIFT, Print, exec, grim - | wl-copy
bind = $mainMod, Print, exec, grim -g "$(slurp)" ~/Pictures/Screenshots/$(date +%Y%m%d_%H%M%S).png

# Theme switch
bind = $mainMod SHIFT, T, exec, ~/.config/hypr/scripts/theme-switch.sh

# Keybindings cheat sheet
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/keyhints.sh

# Wallpaper picker
bind = $mainMod, W, exec, ~/.config/rofi/scripts/rofi-toggle.sh -modi "Wallpaper:~/.config/rofi/scripts/wallpaper.sh" -show Wallpaper -theme ~/.config/rofi/wallpaper-picker.rasi

# Launcher (Claude Code, Cursor, Company links)
bind = $mainMod, C, exec, ~/.config/rofi/scripts/rofi-toggle.sh -modi "Claude:~/.config/rofi/scripts/projects.sh --claude,Cursor:~/.config/rofi/scripts/projects.sh --cursor,Terminal:~/.config/rofi/scripts/projects.sh --terminal,Company:~/.config/rofi/scripts/projects.sh --company" -show Claude

# Dev browser
bind = $mainMod, B, exec, google-chrome-stable --new-window http://localhost:3000 http://localhost:3001
bind = $mainMod SHIFT, B, exec, google-chrome-stable --incognito http://localhost:3001

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Move focus (vim keys)
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap windows (vim keys)
bind = $mainMod CTRL, h, swapwindow, l
bind = $mainMod CTRL, l, swapwindow, r
bind = $mainMod CTRL, k, swapwindow, u
bind = $mainMod CTRL, j, swapwindow, d

# Swap siblings in split
bind = $mainMod, S, layoutmsg, swapsplit

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Volume
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Media
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous
