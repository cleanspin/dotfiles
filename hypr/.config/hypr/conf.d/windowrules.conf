# Window Rules

# Rofi - no animation, instant appear/disappear
windowrule = no_anim on, match:class ^(rofi)$
windowrule = no_anim on, match:class ^(Rofi)$

# Float certain windows
windowrule = float on, match:class ^(pulsemixer)$
windowrule = size 800 400, match:class ^(pulsemixer)$
windowrule = float on, match:title ^(Open File)$
windowrule = float on, match:title ^(Save File)$
windowrule = float on, match:title ^(Confirm)$

# Picture-in-picture
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = pin on, match:title ^(Picture-in-Picture)$
windowrule = size 640 360, match:title ^(Picture-in-Picture)$
windowrule = move 100%-660 100%-380, match:title ^(Picture-in-Picture)$

# Opacity (optional - uncomment if you want transparency)
# windowrule = opacity 0.95 0.85, match:class ^(kitty)$
# windowrule = opacity 0.95 0.85, match:class ^(Code)$
