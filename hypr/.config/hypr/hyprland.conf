# Hyprland Configuration
# Main config - sources modular files

source = ~/.config/hypr/conf.d/monitors.conf
source = ~/.config/hypr/conf.d/autostart.conf
source = ~/.config/hypr/conf.d/appearance.conf
source = ~/.config/hypr/conf.d/keybindings.conf
source = ~/.config/hypr/conf.d/windowrules.conf

# Environment variables
env = XCURSOR_SIZE,30
env = XCURSOR_THEME,Breeze_Light
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_STYLE_OVERRIDE,kvantum
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Input
input {
    kb_layout = us
    # kb_variant = intl
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
    }
}

# General
general {
    gaps_in = 10
    gaps_out = 20
    border_size = 4
    col.active_border = rgba(cba6f7ee) rgba(89b4faee) 45deg
    col.inactive_border = rgba(585b70aa)
    layout = dwindle
    allow_tearing = false
}

# Dwindle layout
dwindle {
    preserve_split = true
}

# Cursor
cursor {
    inactive_timeout = 0.5
}

# Misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}

# Binds
binds {
    allow_workspace_cycles = true
}
