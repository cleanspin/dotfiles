# hypridle - idle daemon
# Burn-in protection: blank both screens after 15 minutes of inactivity.
#
# DP-2 (LG) honors DPMS standby, so plain `dpms off` blanks it.
# HDMI-A-1 (AOC) IGNORES DPMS standby at the firmware level (Hyprland
# reports it off but the backlight stays on), so it must be fully
# disabled to force a real "No Signal" sleep. It is restored on resume
# via `hyprctl reload` (re-reads monitors.conf) — the explicit
# `keyword monitor ... <mode>` restore string silently fails, reload does not.

general {
    ignore_dbus_inhibit = false   # respect idle inhibitors (e.g. fullscreen video)
}

listener {
    timeout = 900   # 15 minutes
    on-timeout = hyprctl --batch "dispatch dpms off ; keyword monitor HDMI-A-1, disable"
    on-resume  = hyprctl --batch "dispatch dpms on ; reload"
}
