# hypridle - idle daemon
# Turns displays off after 15 minutes of inactivity (burn-in protection).

general {
    # Respect idle inhibitors (e.g. fullscreen video keeps the screen on).
    ignore_dbus_inhibit = false
}

listener {
    timeout = 900                            # 15 minutes
    on-timeout = hyprctl dispatch dpms off   # turn displays off
    on-resume = hyprctl dispatch dpms on     # turn displays back on
}
